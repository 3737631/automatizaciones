name: Deploy AutoCandidatura AI to GitHub Pages

on:
  push:
    branches: [master]
    paths:
      - 'autocandidatura-ai/**'

jobs:
  deploy:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: autocandidatura-ai/package-lock.json

      - name: Install dependencies
        run: cd autocandidatura-ai && npm ci

      - name: Build
        run: cd autocandidatura-ai && npm run build

      - name: Deploy to GitHub Pages
        uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./autocandidatura-ai/out
